name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: Release images and chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate chart version matches tag
        run: |
          chart_version="$(awk '/^version:/ { print $2; exit }' charts/coord/Chart.yaml)"
          if [ "v${chart_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} must match charts/coord version v${chart_version}"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/mcp-coord-api:${{ github.ref_name }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/mcp-coord-web:${{ github.ref_name }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.3

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package charts/coord --destination .cr-release-packages

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # Requires a repository secret named CR_TOKEN. GHCR publishing uses the built-in GITHUB_TOKEN.
      - name: Publish chart to gh-pages
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_packaging: true
          packages_with_index: true
          pages_branch: gh-pages
        env:
          CR_TOKEN: ${{ secrets.CR_TOKEN }}
