name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  release:
    name: Release images and chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate chart version matches tag
        id: chart
        run: |
          chart_version="$(awk '/^version:/ { print $2; exit }' charts/coord/Chart.yaml)"
          if [ "v${chart_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} must match charts/coord version v${chart_version}"
            exit 1
          fi
          echo "version=${chart_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/mcp-coord-api:${{ github.ref_name }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/mcp-coord-web:${{ github.ref_name }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/runner/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/mcp-coord-runner:${{ github.ref_name }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.3

      - name: Login Helm to GHCR
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Package chart
        run: |
          mkdir -p .helm-packages
          helm package charts/coord --destination .helm-packages

      - name: Push chart to GHCR OCI
        run: |
          helm push ".helm-packages/coord-${{ steps.chart.outputs.version }}.tgz" "${{ env.CHART_REGISTRY }}"
