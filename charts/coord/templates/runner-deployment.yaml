{{- if .Values.runner.enabled }}
{{- $runnerName := printf "%s-runner" .Release.Name -}}
{{- $serviceAccountName := default $runnerName .Values.runner.serviceAccount.name -}}
{{- $secretName := required "runner.secretRefs.secretName is required when runner.enabled=true" .Values.runner.secretRefs.secretName -}}
{{- $mcoordUrl := required "runner.config.mcoordUrl is required when runner.enabled=true" .Values.runner.config.mcoordUrl -}}
{{- $githubRepo := required "runner.config.githubRepo is required when runner.enabled=true" .Values.runner.config.githubRepo -}}
{{- $labels := dict "app.kubernetes.io/name" .Chart.Name "app.kubernetes.io/instance" .Release.Name "app.kubernetes.io/component" "runner" "app.kubernetes.io/managed-by" .Release.Service "helm.sh/chart" (printf "%s-%s" .Chart.Name (.Chart.Version | replace "+" "_")) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $runnerName }}
  labels:
    {{- toYaml $labels | nindent 4 }}
spec:
  replicas: {{ .Values.runner.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: runner
  template:
    metadata:
      labels:
        {{- toYaml $labels | nindent 8 }}
        {{- with .Values.runner.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.runner.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ $serviceAccountName }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runner.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: prepare-project-workdir
          image: alpine/git:2.47.2
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              set -eu
              if [ ! -d {{ .Values.runner.workdir.mountPath | quote }}/.git ]; then
                git \
                  -c http.extraHeader="Authorization: Bearer ${GITHUB_TOKEN}" \
                  clone "https://github.com/${GITHUB_REPO}.git" {{ .Values.runner.workdir.mountPath | quote }}
              else
                git -C {{ .Values.runner.workdir.mountPath | quote }} \
                  -c http.extraHeader="Authorization: Bearer ${GITHUB_TOKEN}" \
                  fetch origin main --prune
                git -C {{ .Values.runner.workdir.mountPath | quote }} checkout -B main origin/main
                git -C {{ .Values.runner.workdir.mountPath | quote }} reset --hard origin/main
                git -C {{ .Values.runner.workdir.mountPath | quote }} clean -fd
              fi
          env:
            - name: GITHUB_REPO
              value: {{ $githubRepo | quote }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.runner.secretRefs.githubToken.key }}
          volumeMounts:
            - name: project-workdir
              mountPath: {{ .Values.runner.workdir.mountPath | quote }}
      containers:
        - name: runner
          image: "{{ .Values.runner.image.repository }}:{{ default .Chart.AppVersion .Values.runner.image.tag }}"
          imagePullPolicy: {{ .Values.runner.image.pullPolicy }}
          workingDir: {{ .Values.runner.workdir.mountPath | quote }}
          {{- with .Values.runner.container.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.runner.container.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: MCOORD_URL
              value: {{ $mcoordUrl | quote }}
            - name: GITHUB_REPO
              value: {{ $githubRepo | quote }}
            - name: DEFAULT_DRIVER
              value: {{ .Values.runner.config.defaultDriver | quote }}
            - name: POLL_INTERVAL_SECONDS
              value: {{ .Values.runner.config.pollIntervalSeconds | quote }}
            - name: JOB_TTL_SECONDS
              value: {{ .Values.runner.config.jobTtlSeconds | quote }}
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: {{ .Values.runner.secretRefs.mcoordKey.envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.runner.secretRefs.mcoordKey.key }}
            - name: {{ .Values.runner.secretRefs.githubToken.envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.runner.secretRefs.githubToken.key }}
          volumeMounts:
            - name: project-workdir
              mountPath: {{ .Values.runner.workdir.mountPath | quote }}
          {{- with .Values.runner.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: project-workdir
          persistentVolumeClaim:
            claimName: agent-workdir
      {{- with .Values.runner.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runner.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runner.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
