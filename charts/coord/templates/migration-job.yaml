{{- if .Values.migration.enabled }}
{{- $secretName := "" -}}
{{- if .Values.secret.create -}}
{{- $secretName = default (printf "%s-secret" .Release.Name) .Values.secret.name -}}
{{- else if .Values.secret.name -}}
{{- $secretName = .Values.secret.name -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-migrations" .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: {{ .Values.component | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name (.Chart.Version | replace "+" "_") }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    {{- with .Values.migration.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: {{ .Values.component | quote }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: migrations
          image: "{{ default .Values.image.repository .Values.migration.image.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.migration.image.tag }}"
          imagePullPolicy: {{ default .Values.image.pullPolicy .Values.migration.image.pullPolicy }}
          command:
            {{- toYaml .Values.migration.command | nindent 12 }}
          args:
            {{- toYaml .Values.migration.args | nindent 12 }}
          env:
            {{- range $name, $value := .Values.env.values }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if and $secretName .Values.secret.databaseUrl }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: DATABASE_URL
            {{- end }}
            {{- if and $secretName .Values.secret.coordApiKeys }}
            - name: COORD_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: COORD_API_KEYS
            {{- end }}
            {{- range .Values.env.secretRefs }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ default $secretName .secretName }}
                  key: {{ .key }}
            {{- end }}
{{- end }}
